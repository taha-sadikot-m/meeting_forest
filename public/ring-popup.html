<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incoming call — Meeting Forest</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .ring-card {
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 24px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }
    .ring-avatar-wrap { position: relative; width: 72px; height: 72px; margin: 0 auto 20px; }
    .ring-pulse {
      position: absolute; inset: -10px; border-radius: 50%;
      border: 3px solid rgba(209,80,0,.5);
      animation: ringPulse 1.4s ease-in-out infinite;
    }
    .ring-pulse2 {
      position: absolute; inset: -18px; border-radius: 50%;
      border: 2px solid rgba(209,80,0,.25);
      animation: ringPulse 1.4s ease-in-out .35s infinite;
    }
    @keyframes ringPulse {
      0% { transform: scale(.9); opacity: .6; }
      70% { transform: scale(1.1); opacity: 0; }
      100% { opacity: 0; }
    }
    .ring-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, #D15000, #ff7b2e);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800; color: #fff;
      position: relative; z-index: 1;
      box-shadow: 0 6px 24px rgba(209,80,0,.4);
    }
    .ring-from-label {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,.4);
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px;
    }
    .ring-from-name { font-size: 18px; font-weight: 800; margin-bottom: 2px; }
    .ring-from-email { font-size: 12px; color: rgba(255,255,255,.45); margin-bottom: 14px; }
    .ring-meeting-chip {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: 6px 12px; margin-bottom: 6px;
    }
    .ring-meeting-name { font-size: 12px; font-weight: 700; color: rgba(255,255,255,.8); }
    .ring-meeting-id { font-size: 10px; color: rgba(255,255,255,.35); margin-top: 1px; }
    .ring-countdown {
      font-size: 12px; color: rgba(255,255,255,.35);
      margin: 12px 0 18px; font-variant-numeric: tabular-nums;
    }
    .ring-countdown span { color: rgba(255,255,255,.6); font-weight: 700; }
    #ringTapPrompt {
      font-size: 11px; color: rgba(255,255,255,.55); margin-bottom: 10px;
    }
    .ring-actions { display: flex; gap: 10px; }
    .ring-btn-accept, .ring-btn-decline {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 12px; border-radius: 14px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 700; font-family: inherit;
    }
    .ring-btn-accept {
      background: linear-gradient(135deg, #059669, #10B981); color: #fff;
      box-shadow: 0 4px 16px rgba(16,185,129,.35);
    }
    .ring-btn-decline {
      background: rgba(239,68,68,.15); color: #EF4444;
      border: 1.5px solid rgba(239,68,68,.3);
    }
  </style>
</head>
<body>
  <div class="ring-card">
    <div class="ring-avatar-wrap">
      <div class="ring-pulse"></div>
      <div class="ring-pulse2"></div>
      <div class="ring-avatar" id="ringAvatarChar">?</div>
    </div>
    <div class="ring-from-label">Incoming call</div>
    <div class="ring-from-name" id="ringFromName">Someone</div>
    <div class="ring-from-email" id="ringFromEmail"></div>
    <div style="display:flex;justify-content:center">
      <div class="ring-meeting-chip">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2">
          <path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.845v6.31a1 1 0 0 1-1.447.894L15 14M5 18h8a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2z"/>
        </svg>
        <div>
          <div class="ring-meeting-name" id="ringMeetingLabel">Meeting</div>
          <div class="ring-meeting-id" id="ringMeetingId"></div>
        </div>
      </div>
    </div>
    <div class="ring-countdown">Ringing… <span id="ringTimer">2:00</span> remaining</div>
    <div id="ringTapPrompt">Tap anywhere to enable ring tone</div>
    <div class="ring-actions">
      <button class="ring-btn-accept" id="ringAcceptBtn">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.845v6.31a1 1 0 0 1-1.447.894L15 14M5 18h8a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2z"/>
        </svg>
        Join
      </button>
      <button class="ring-btn-decline" id="ringDeclineBtn">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        Decline
      </button>
    </div>
  </div>
  <script>
  (function () {
    'use strict';

    var RING_MS = 2 * 60 * 1000;
    var params = new URLSearchParams(location.search);
    var ringId = params.get('ringId') || '';
    var fromName = params.get('fromName') || 'Someone';
    var fromEmail = params.get('fromEmail') || '';
    var meetingId = params.get('meetingId') || '';
    var meetingLabel = params.get('meetingLabel') || meetingId;
    var startedAt = parseInt(params.get('startedAt') || '0', 10) || Date.now();

    if (!ringId) {
      document.body.innerHTML = '<p style="color:rgba(255,255,255,.5);text-align:center">No incoming call.</p>';
      return;
    }

    var ringAudio = null;
    var countdownTimer = null;
    var ringResolved = false;

    function rejectOnServer() {
      if (ringResolved || !ringId) return;
      ringResolved = true;
      fetch('/api/rings/' + encodeURIComponent(ringId) + '/respond', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'reject' }),
      }).catch(function () {});
    }

    function buildRingToneDataUri() {
      var sampleRate = 11025;
      var duration = 0.8;
      var numSamples = Math.floor(sampleRate * duration);
      var dataSize = numSamples * 2;
      var buffer = new ArrayBuffer(44 + dataSize);
      var view = new DataView(buffer);
      function writeStr(offset, str) {
        for (var i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
      }
      writeStr(0, 'RIFF');
      view.setUint32(4, 36 + dataSize, true);
      writeStr(8, 'WAVE');
      writeStr(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeStr(36, 'data');
      view.setUint32(40, dataSize, true);
      for (var i = 0; i < numSamples; i++) {
        var t = i / sampleRate;
        var freq = (Math.floor(t * 5) % 2 === 0) ? 440 : 480;
        var sample = Math.sin(2 * Math.PI * freq * t) * 0.35;
        var envelope = 1;
        if (i < sampleRate * 0.05) envelope = i / (sampleRate * 0.05);
        if (i > numSamples - sampleRate * 0.08) envelope = (numSamples - i) / (sampleRate * 0.08);
        view.setInt16(44 + i * 2, sample * envelope * 32767, true);
      }
      var bytes = new Uint8Array(buffer);
      var binary = '';
      for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]);
      return 'data:audio/wav;base64,' + btoa(binary);
    }

    var RING_TONE_URI = buildRingToneDataUri();

    function startRingSound() {
      if (!ringAudio) {
        ringAudio = new Audio(RING_TONE_URI);
        ringAudio.loop = true;
        ringAudio.volume = 0.7;
        ringAudio.preload = 'auto';
      }
      ringAudio.currentTime = 0;
      var p = ringAudio.play();
      if (p && p.then) {
        p.then(function () {
          console.log('[ring-popup] ring sound playing');
          document.getElementById('ringTapPrompt').style.display = 'none';
        }).catch(function () {
          console.warn('[ring-popup] ring sound blocked — tap window');
          document.getElementById('ringTapPrompt').style.display = '';
        });
      }
    }

    function stopRingSound() {
      if (ringAudio) {
        ringAudio.pause();
        ringAudio.currentTime = 0;
      }
    }

    function updateTimer(ms) {
      var s = Math.ceil(ms / 1000);
      var min = Math.floor(s / 60);
      var sec = String(s % 60).padStart(2, '0');
      document.getElementById('ringTimer').textContent = min + ':' + sec;
    }

    function closePopup() {
      rejectOnServer();
      stopRingSound();
      clearInterval(countdownTimer);
      window.close();
    }

    function acceptRing() {
      ringResolved = true;
      stopRingSound();
      clearInterval(countdownTimer);
      fetch('/api/rings/' + encodeURIComponent(ringId) + '/respond', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'accept' }),
      }).catch(function () {});
      if (meetingId) {
        window.location.href = '/room/' + encodeURIComponent(meetingId) + '?joined_muted=true';
      }
    }

    function declineRing() {
      rejectOnServer();
      stopRingSound();
      clearInterval(countdownTimer);
      window.close();
    }

    document.getElementById('ringAvatarChar').textContent =
      (fromName || fromEmail || '?')[0].toUpperCase();
    document.getElementById('ringFromName').textContent = fromName || fromEmail;
    document.getElementById('ringFromEmail').textContent = fromEmail;
    document.getElementById('ringMeetingLabel').textContent = meetingLabel;
    document.getElementById('ringMeetingId').textContent = meetingId;

    document.getElementById('ringAcceptBtn').addEventListener('click', acceptRing);
    document.getElementById('ringDeclineBtn').addEventListener('click', declineRing);

    function unlockLocalRingSound() {
      startRingSound();
    }

    if (!window.opener || window.opener.closed) {
      document.getElementById('ringTapPrompt').style.display = '';
      document.body.addEventListener('pointerdown', unlockLocalRingSound);
      document.addEventListener('keydown', unlockLocalRingSound);
    } else {
      document.getElementById('ringTapPrompt').style.display = 'none';
    }

    var remaining = Math.max(0, RING_MS - (Date.now() - startedAt));
    updateTimer(remaining);
    countdownTimer = setInterval(function () {
      remaining -= 1000;
      if (remaining <= 0) {
        clearInterval(countdownTimer);
        closePopup();
        return;
      }
      updateTimer(remaining);
    }, 1000);

    window.focus();
  })();
  </script>
</body>
</html>
